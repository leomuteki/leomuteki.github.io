<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Emilio Game | Emilio Segovia</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="/HireEmilio_TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; }
      body {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .nav-bar {
        width: 100%;
        background: #16213e;
        padding: 12px 0;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
      .nav-bar a {
        color: #a8b2d1;
        text-decoration: none;
        margin: 0 16px;
        font-size: 14px;
        transition: color 0.2s;
      }
      .nav-bar a:hover {
        color: #64ffda;
      }
      .game-header {
        margin: 24px 0 16px;
        text-align: center;
      }
      .game-header h1 {
        font-size: 28px;
        color: #ccd6f6;
        margin-bottom: 6px;
      }
      .game-header p {
        color: #8892b0;
        font-size: 14px;
      }
      #unity-container {
        position: relative;
      }
      #unity-canvas {
        background: #231F20;
      }
      .back-link {
        margin: 20px 0 40px;
      }
      .back-link a {
        color: #64ffda;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid #64ffda;
        padding: 8px 20px;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .back-link a:hover {
        background: rgba(100, 255, 218, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <a href="/">Home</a>
      <a href="/Projects">Projects</a>
      <a href="/2D_Art">2D Art</a>
      <a href="/3D_Art">3D Art</a>
      <a href="/GraphicDesign">Graphic Design</a>
    </div>

    <div class="game-header">
      <h1>Hire Emilio Game</h1>
      <p>An interactive WebGL game — click the fullscreen button for the best experience</p>
    </div>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">HireEmilio</div>
      </div>
    </div>

    <div class="back-link">
      <a href="/">&larr; Back to Portfolio</a>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "/HireEmilio_Build";
      var loaderUrl = buildUrl + "/HireEmilioBuild.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/HireEmilioBuild.data",
        frameworkUrl: buildUrl + "/HireEmilioBuild.framework.js",
        codeUrl: buildUrl + "/HireEmilioBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "HireEmilio",
        productVersion: "5.0.7",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
